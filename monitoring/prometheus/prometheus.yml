global:
  scrape_interval:     5s
  evaluation_interval: 5s
  external_labels:
    cluster: 'distributed-search-local'

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:3001']
    metrics_path: /metrics

  - job_name: 'query-coordinator'
    static_configs:
      - targets: ['coordinator:9090']
    metrics_path: /metrics

  - job_name: 'shard-1'
    static_configs:
      - targets: ['shard-1:8080']
    metrics_path: /metrics

  - job_name: 'shard-2'
    static_configs:
      - targets: ['shard-2:8080']
    metrics_path: /metrics

  - job_name: 'shard-3'
    static_configs:
      - targets: ['shard-3:8080']
    metrics_path: /metrics
